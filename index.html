  <script>
    const APP_VERSION = "v2.1";
    const DB_NAME = "esp_db", DB_VER = 1, STORE = "kv";
    const LS_KEY = "esp_progress";

    function openDB() {
      return new Promise((res, rej) => {
        const r = indexedDB.open(DB_NAME, DB_VER);
        r.onupgradeneeded = e => e.target.result.createObjectStore(STORE);
        r.onsuccess = e => res(e.target.result);
        r.onerror = () => rej(r.error);
      });
    }

    async function dbGet(key) {
      try {
        const db = await openDB();
        return await new Promise((res, rej) => {
          const r = db.transaction(STORE, "readonly").objectStore(STORE).get(key);
          r.onsuccess = () => res(r.result ?? null);
          r.onerror = () => rej(r.error);
        });
      } catch { return null; }
    }

    async function dbSet(key, val) {
      try {
        const db = await openDB();
        await new Promise((res, rej) => {
          const tx = db.transaction(STORE, "readwrite");
          tx.objectStore(STORE).put(val, key);
          tx.oncomplete = res;
          tx.onerror = () => rej(tx.error);
        });
      } catch {}
    }

    async function loadProgress() {
      try {
        const raw = localStorage.getItem(LS_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (parsed && Object.keys(parsed).length > 0) return parsed;
        }
      } catch {}
      const fromIDB = await dbGet("progress");
      if (fromIDB && Object.keys(fromIDB).length > 0) return fromIDB;
      return {};
    }

    async function saveProgress(data) {
      try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch {}
      await dbSet("progress", data);
    }
  </script>

      { uk: "розуміти",    es: "entender" },
      { uk: "пам'ятати",   es: "recordar" },
    ];

    const MASTER_THRESHOLD = 10;
    const REVIEW_INTERVAL_MS = 7 * 24 * 60 * 60 * 1000;
    const ROUND_SIZE = 5;

    function shuffle(arr) {
      return [...arr].sort(() => Math.random() - 0.5);
    }

    function getActiveWords(progress) {
      const now = Date.now();
      return ALL_WORDS.filter(w => {
        const p = progress[w.uk];
        if (!p) return true;
        if (p.correct >= MASTER_THRESHOLD) {
          return now - (p.lastReview || 0) >= REVIEW_INTERVAL_MS;
        }
        return true;
      });
    }

    function getMasteredCount(progress) {
      return ALL_WORDS.filter(w => (progress[w.uk]?.correct || 0) >= MASTER_THRESHOLD).length;
    }

    function getRound(words) {
      const pool = words.length >= ROUND_SIZE ? words : ALL_WORDS;
      const picked = shuffle(pool).slice(0, ROUND_SIZE);
      const left  = shuffle(picked.map(w => ({ id: w.uk, label: w.uk })));
      const right = shuffle(picked.map(w => ({ id: w.uk, label: w.es })));
      return { left, right, pairs: picked };
    }

    // Шукаємо іспанський голос явно, щоб уникнути англійського акценту
    function speak(text) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "es-ES";
      u.rate = 0.85;
      const voices = window.speechSynthesis.getVoices();
      const esVoice = voices.find(v => v.lang.startsWith("es") && !v.lang.startsWith("es-US"))
                   || voices.find(v => v.lang.startsWith("es"));
      if (esVoice) u.voice = esVoice;
      window.speechSynthesis.speak(u);
    }

    // Голоси можуть завантажуватись асинхронно — чекаємо
    if (window.speechSynthesis && window.speechSynthesis.onvoiceschanged !== undefined) {
      window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }

    function App() {
      const [progress, setProgress]         = useState({});
      const [round, setRound]               = useState(() => getRound(ALL_WORDS));
      const [selLeft, setSelLeft]           = useState(null);
      const [selRight, setSelRight]         = useState(null);
      const [matched, setMatched]           = useState([]);
      const [wrong, setWrong]               = useState([]);
      const [sessionStats, setSessionStats] = useState({ correct: 0, wrong: 0 });
      const [flash, setFlash]               = useState(null);
      const [loaded, setLoaded]             = useState(false);
      const [saveStatus, setSaveStatus]     = useState(null);
      const progressRef = useRef({});

      function loadAndApply(p) {
        progressRef.current = p;
        setProgress(p);
        setRound(getRound(getActiveWords(p)));
        setMatched([]);
        setSelLeft(null);
        setSelRight(null);
      }

      async function persistProgress(data) {
        setSaveStatus("saving");
        try {
          await saveProgress(data);
          setSaveStatus("saved");
        } catch {
          setSaveStatus("error");
        }
        setTimeout(() => setSaveStatus(null), 1500);
      }

      useEffect(() => {
        loadProgress().then(saved => {
          loadAndApply(saved || {});
          setLoaded(true);
        });
      }, []);

      useEffect(() => {
        function onVisible() {
          if (document.visibilityState === "visible") {
            loadProgress().then(saved => loadAndApply(saved || {}));
          }
        }
        document.addEventListener("visibilitychange", onVisible);
        return () => document.removeEventListener("visibilitychange", onVisible);
      }, []);

      const mastered = getMasteredCount(progress);
      const total    = sessionStats.correct + sessionStats.wrong;
      const acc      = total > 0 ? Math.round((sessionStats.correct / total) * 100) : 100;

      useEffect(() => {
        if (!selLeft || !selRight) return;
        const isMatch = selLeft.id === selRight.id;

        if (isMatch) {
          const word = ALL_WORDS.find(w => w.uk === selRight.id);
          if (word) speak(word.es);

          const np = { ...progressRef.current };
          const prev = np[selLeft.id] || { correct: 0, wrong: 0 };
          const newCorrect = prev.correct + 1;
          np[selLeft.id] = {
            ...prev,
            correct: newCorrect,
            lastReview: newCorrect >= MASTER_THRESHOLD ? Date.now() : prev.lastReview,
          };
          progressRef.current = np;
          setProgress(np);
          persistProgress(np);

          setMatched(m => [...m, selLeft.id]);
          setSessionStats(s => ({ ...s, correct: s.correct + 1 }));
          setFlash("good");
          setSelLeft(null);
          setSelRight(null);
          setTimeout(() => setFlash(null), 400);
        } else {
          const np = { ...progressRef.current };
          const prev = np[selLeft.id] || { correct: 0, wrong: 0 };
          np[selLeft.id] = { ...prev, wrong: (prev.wrong || 0) + 1 };
          progressRef.current = np;
          setProgress(np);
          persistProgress(np);

          setWrong([selLeft.id, selRight.id]);
          setSessionStats(s => ({ ...s, wrong: s.wrong + 1 }));
          setFlash("bad");
          setTimeout(() => {
            setWrong([]);
            setSelLeft(null);
            setSelRight(null);
            setFlash(null);
          }, 700);
        }
      }, [selLeft, selRight]);

      useEffect(() => {
        if (matched.length === round.pairs.length && matched.length > 0) {
          setTimeout(() => {
            const active = getActiveWords(progressRef.current);
            setRound(getRound(active));
            setMatched([]);
            setSelLeft(null);
            setSelRight(null);
          }, 600);
        }
      }, [matched]);

      if (!loaded) return (
        <div style={{ background: "#0f1117", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <span style={{ color: "#4a9eff", fontFamily: "sans-serif", fontSize: 16 }}>Завантаження...</span>
        </div>
      );

      const bgFlash = flash === "good" ? "#1a3a2a" : flash === "bad" ? "#3a1a1a" : "#0f1117";
      const saveIcon = saveStatus === "saving" ? "💾" : saveStatus === "saved" ? "✓" : saveStatus === "error" ? "⚠️" : null;
      const saveColor = saveStatus === "error" ? "#ff6b6b" : "#4aff8a";

      function Card({ item, side, sel, onPress }) {
        const isMatched = matched.includes(item.id);
        const isWrong   = wrong.includes(item.id);
        const isSel     = sel?.id === item.id;
        const isEs      = side === "right";
        let bg = "#1c1f2e";
        if (isMatched) bg = "#1a3a2a";
        else if (isWrong) bg = "#3a1a1a";
        else if (isSel) bg = "#1e3a5f";
        return (
          <div style={{ position: "relative" }}>
            <button onClick={() => !isMatched && onPress(item)} style={{
              background: bg,
              border: isSel ? "1.5px solid #4a9eff" : isWrong ? "1.5px solid #ff4a4a" : isMatched ? "1.5px solid #4aff8a" : "1.5px solid #2a2d3e",
              borderRadius: 14, color: isMatched ? "#4aff8a" : "#e8eaf0", fontSize: 15,
              padding: isEs ? "14px 28px 14px 8px" : "14px 8px", width: "100%",
              cursor: isMatched ? "default" : "pointer", opacity: isMatched ? 0.4 : 1,
              transition: "all 0.15s", fontFamily: "sans-serif", textAlign: "center",
            }}>{item.label}</button>
            {isEs && (
              <button onClick={e => { e.stopPropagation(); const word = ALL_WORDS.find(w => w.uk === item.id); if (word) speak(word.es); }}
                style={{ position: "absolute", right: 6, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", cursor: "pointer", fontSize: 16, padding: 4, color: "#4a9eff", opacity: isMatched ? 0.3 : 0.7 }}>🔊</button>
            )}
          </div>
        );
      }

      return (
        <div style={{ background: bgFlash, minHeight: "100vh", padding: "20px 16px", transition: "background 0.2s", fontFamily: "sans-serif" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4, fontSize: 13 }}>
            <span style={{ color: "#4aff8a" }}>✅ {sessionStats.correct}</span>
            <span style={{ color: "#ffd700", fontWeight: 600 }}>🎓 {mastered}/{ALL_WORDS.length}</span>
            <span style={{ color: "#ff6b6b" }}>❌ {sessionStats.wrong}</span>
            <span style={{ color: acc >= 70 ? "#4aff8a" : "#ff6b6b" }}>{acc}%</span>
            <span style={{ color: saveColor, fontSize: 13, minWidth: 18, textAlign: "center", opacity: saveIcon ? 1 : 0 }}>{saveIcon}</span>
          </div>
          <div style={{ textAlign: "right", marginBottom: 8 }}>
            <span style={{ color: "#3a3f5a", fontSize: 10 }}>{APP_VERSION}</span>
          </div>
          <div style={{ background: "#1c1f2e", borderRadius: 6, height: 5, marginBottom: 24 }}>
            <div style={{ background: "#4a9eff", height: 5, borderRadius: 6, width: `${(matched.length / round.pairs.length) * 100}%`, transition: "width 0.3s" }} />
          </div>
          <p style={{ color: "#8890a8", textAlign: "center", marginBottom: 18, fontSize: 13 }}>Натисни пару слів</p>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            {round.left.map((item, i) => (
              <div key={item.id} style={{ display: "contents" }}>
                <Card item={item} side="left" sel={selLeft} onPress={setSelLeft} />
                <Card item={round.right[i]} side="right" sel={selRight} onPress={setSelRight} />
              </div>
            ))}
          </div>
          {mastered > 0 && (
            <p style={{ color: "#4aff8a", textAlign: "center", marginTop: 24, fontSize: 12, opacity: 0.6 }}>
              {mastered} слів вивчено — повторення через тиждень
            </p>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/spanish-words/sw.js");
    }
